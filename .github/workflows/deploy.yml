name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  # Auto-merge squash-merges PRs with GITHUB_TOKEN, and pushes made by
  # GITHUB_TOKEN do NOT trigger the push event above (GitHub's recursion guard).
  # workflow_dispatch is an explicit exception, so automerge.yml dispatches this.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # The `secrets` context is not allowed in an `if:` conditional, so we pipe
      # the secret into a step's env and gate the real steps on this output —
      # main shows a green/neutral run (not a red X) when secrets aren't set.
      # Also gate on the canonical repo so forks never deploy.
      - name: Check for Cloudflare secrets
        id: guard
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF_TOKEN" ] && [ "${{ github.repository }}" = "H1D/barcode-studio" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "No CLOUDFLARE_API_TOKEN secret (or non-canonical repo) — skipping deploy."
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        if: steps.guard.outputs.configured == 'true'

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        if: steps.guard.outputs.configured == 'true'
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        if: steps.guard.outputs.configured == 'true'
        run: bun install --frozen-lockfile

      - name: Build
        if: steps.guard.outputs.configured == 'true'
        run: bun run build

      - name: Deploy to Cloudflare Pages
        if: steps.guard.outputs.configured == 'true'
        run: bun x wrangler pages deploy dist --project-name=barcode-studio --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
